version: "3.9"

services:

  # ── Ollama (LLM runtime) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: lean_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # раскомментируй для GPU-режима (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lean_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lean_ai
      POSTGRES_USER: lean
      POSTGRES_PASSWORD: lean_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ── Backend FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lean_backend
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b          # или saiga:7b / llama3.1:8b / mistral:7b
      WHISPER_MODEL: base               # tiny / base / small
      DATABASE_URL: postgresql://lean:lean_secret_2024@postgres:5432/lean_ai
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      - postgres

  # ── Nginx (фронтенд + reverse proxy) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lean_nginx
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  ollama_data:
  postgres_data:
